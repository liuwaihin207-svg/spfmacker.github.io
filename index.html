<!DOCTYPE html>
<html>
<head>
  <title>HTML Files Index</title>
  <style>
    body {
      background-color: #334;
      color: white;
      font-family: "UD Digi Kyokasho NK-R", sans-serif;
      font-size: 1.5rem;
      text-align: center;
      padding: 40px 20px;
      margin: 0;
    }
    a {
      color: #ffc;
      text-decoration: none;
      font-size: inherit;
    }
    a:hover {
      text-decoration: underline;
    }
    h1 {
      color: white;
      font-size: 2.5rem;
      margin-bottom: 30px;
    }
    ul {
      list-style-type: none;
      padding-left: 0;
      margin: 0 auto;
      display: inline-block;
      text-align: left;
    }
    li {
      margin: 15px 0;
    }
  </style>
</head>
<body>
  <h1>Fonts</h1>
  <ul id="file-list"></ul>
  <script>
    const owner = "liuwaihin207-svg";
    const repo = "spfmacker.github.io";
    const path = "";

    fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`)
      .then(res => res.json())
      .then(files => {
        const list = document.getElementById("file-list");
        files.forEach(file => 
          if (file.name.endsWith(".html") && file.name !== "index.html") {
            const li = document.createElement("li");
            const a = document.createElement("a");
            a.href = file.name;
            a.textContent = file.name;
            li.appendChild(a);
            list.appendChild(li);
          }
        });
      })
      .catch(err => console.error("Error fetching files:", err));
  </script>
</body>
</html>
